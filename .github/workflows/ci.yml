name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore RestaurantManagement.sln

      - name: Build
        run: dotnet build RestaurantManagement.sln --configuration Release --no-restore

      - name: Test with coverage
        run: dotnet test RestaurantManagement.Tests/RestaurantManagement.Tests.csproj --configuration Release --no-build --collect:"XPlat Code Coverage"
